name: CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  frontend:
    name: Frontend (lint/test/coverage/build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install
        run: npm ci

      - name: Lint
        run: npm run lint --if-present

      - name: Test (with coverage)
        run: npm run test --if-present

      - name: Build
        run: npm run build

      - name: Upload coverage (frontend)
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-frontend
          path: frontend/coverage/lcov.info
          if-no-files-found: warn

  backend:
    name: Backend (lint/test/coverage/build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    env:
      DATABASE_URL: postgresql://placeholder:placeholder@localhost:5432/placeholder

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: "npm"
          cache-dependency-path: backend/package-lock.json

      - name: Install
        run: npm ci

      - name: Prisma generate
        run: npx prisma generate

      - name: Lint
        run: npm run lint --if-present

      - name: Test (with coverage)
        run: npm run test --if-present
        continue-on-error: true

      - name: Build
        run: npm run build

      - name: Upload coverage (backend)
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-backend
          path: backend/coverage/lcov.info
          if-no-files-found: warn

  docker:
    name: Docker builds
    runs-on: ubuntu-latest
    needs: [frontend, backend]

    steps:
      - uses: actions/checkout@v6

      - name: Build backend image
        run: docker build -t brainleaf-backend ./backend

      - name: Build frontend image
        run: |
          docker build \
            --build-arg VITE_API_URL=http://localhost:8000 \
            -t brainleaf-frontend ./frontend

      - name: Validate production Compose
        run: docker compose -f compose.prod.yaml config --no-interpolate
