name: Deploy Docker to VPS

on:
  push:
    branches:
      - main

env:
  REGISTRY: ghcr.io
  IMAGE_TAG: ${{ github.sha }}

jobs:
  deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - id: meta
        run: echo "owner=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          labels: org.opencontainers.image.source=https://github.com/${{ github.repository }}
          tags: |
            ${{ env.REGISTRY }}/${{ steps.meta.outputs.owner }}/cue-backend:${{ env.IMAGE_TAG }}
            ${{ env.REGISTRY }}/${{ steps.meta.outputs.owner }}/cue-backend:latest

      - uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          labels: org.opencontainers.image.source=https://github.com/${{ github.repository }}
          build-args: |
            VITE_API_URL=${{ secrets.VITE_API_URL }}
          tags: |
            ${{ env.REGISTRY }}/${{ steps.meta.outputs.owner }}/cue-frontend:${{ env.IMAGE_TAG }}
            ${{ env.REGISTRY }}/${{ steps.meta.outputs.owner }}/cue-frontend:latest

      - run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts

      - run: |
          scp compose.prod.yaml \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/var/www/cue/compose.prod.yaml

      - run: |
          ssh ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} "
            set -e
            cd /var/www/cue
            echo APP_VERSION=${{ env.IMAGE_TAG }} > .env
            docker-compose -f compose.prod.yaml pull
            docker-compose -f compose.prod.yaml down
            docker compose -f compose.prod.yaml run --rm backend npx prisma migrate deploy
            docker-compose -f compose.prod.yaml up -d
            docker image prune -f
          "
